name: Release Obsidian plugin

# Pushing a tag that matches the manifest version (no leading "v", e.g. 0.1.0)
# builds the plugin and publishes a GitHub release with the assets BRAT needs.
on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write # required for build-provenance attestation
  attestations: write # required for build-provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm run build

      # Cryptographically attest that main.js was built from this repo (provenance).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: main.js

      # Obsidian only downloads manifest.json + main.js (+ styles.css) from a release;
      # versions.json is read from the repo root, so it is NOT attached here.
      - name: Create release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release $TAG" \
            manifest.json main.js
